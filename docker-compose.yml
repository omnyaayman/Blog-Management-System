version: '3.8'

services:
  app:
    build: .
    container_name: blog_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: blog_redis
    ports:
      - "6379:6379"
