<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Blog Platform</title>
    <meta name="description" content="A dynamic and vibrant blog management platform.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="navbar glass-effect">
        <div class="nav-content">
            <h1 class="logo">Nexus<span>Blog</span></h1>
            <div id="nav-actions">
                <!-- Dynamically populated based on auth state -->
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Auth Section -->
        <section id="auth-section" class="glass-panel slide-up">
            <div class="auth-tabs">
                <button class="tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="tab" onclick="switchAuthTab('register')">Register</button>
            </div>

            <div id="login-form" class="auth-form active">
                <h2>Welcome Back</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn primary-btn">Login</button>
                    <div id="login-error" class="error-msg"></div>
                </form>
            </div>

            <div id="register-form" class="auth-form">
                <h2>Create Account</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" required placeholder="Choose a username">
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required placeholder="Create a password">
                    </div>
                    <button type="submit" class="btn primary-btn">Register</button>
                    <div id="reg-error" class="error-msg"></div>
                </form>
            </div>
        </section>

        <!-- Blog Section (Visible after login) -->
        <section id="blog-section" class="hidden">
            <!-- Admin Dashboard (Only for Admin) -->
            <div id="admin-dashboard" class="admin-section hidden slide-up">
                <h3>System Administration</h3>
                <div class="admin-table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-users-list">
                            <!-- Users loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Create Post Panel (Only for Admin/Author) -->
            <div id="create-post-panel" class="create-post-panel glass-panel slide-up delay-1 hidden">
                <h3>Write a new post</h3>
                <form onsubmit="handleCreatePost(event)">
                    <div class="input-group">
                        <input type="text" id="post-title" required placeholder="Post Title">
                    </div>
                    <div class="input-group">
                        <textarea id="post-content" required placeholder="What's on your mind?" rows="4"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn primary-btn">Publish Post</button>
                    </div>
                </form>
            </div>

            <!-- Posts Feed -->
            <div class="feed-header slide-up delay-2">
                <h2>Recent Posts</h2>
            </div>
            <div id="posts-container" class="posts-grid slide-up delay-3">
                <!-- Posts will be dynamically injected here -->
                <div class="loading-spinner"></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
